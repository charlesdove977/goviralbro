<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 380" width="620" height="380">
  <defs>
    <style>
      .bg { fill: #1e1e2e; }
      .titlebar { fill: #313244; }
      .red { fill: #f38ba8; }
      .yellow { fill: #f9e2af; }
      .green { fill: #a6e3a1; }
      .text { fill: #cdd6f4; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
      .blue { fill: #89b4fa; }
      .dim { fill: #6c7086; }
